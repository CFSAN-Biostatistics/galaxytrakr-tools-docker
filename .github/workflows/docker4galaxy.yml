name: Build Custom Containers and Update XML (if Dockerfile changes)

on:
  push:
    branches: [ main ]
    paths:
      - 'tools/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-patch:
    name: Build Container and Patch XML
    runs-on: ubuntu-latest
    steps:
      # --- Steps 1-3 are unchanged ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GALAXYTRAKR_PAT }}
          fetch-depth: 2

      - name: Authenticate to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Step 4 is now corrected ---
      - name: Detect Changes and Determine Build Strategy
        id: build_logic
        run: |
          echo "Detecting changed files in the last commit..."
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          # First, check if any of the changed files was a Dockerfile.
          if echo "$CHANGED_FILES" | grep -q "Dockerfile"; then
            echo "Dockerfile change detected. A container rebuild is required."
            
            # --- THE CRITICAL FIX IS HERE ---
            # This 'sed' command correctly finds the top-level tool directory (e.g., tools/cfsan2snp2)
            # for any changed Dockerfile.
            DIRS_TO_BUILD=$(echo "$CHANGED_FILES" | grep "Dockerfile" | sed -E 's|^(tools/[^/]+)/.*|\1|' | sort -u)
            
            if [ -z "$DIRS_TO_BUILD" ]; then
                echo "Could not determine directories to build. This should not happen."
                exit 1
            fi
            
            echo "build_required=true" >> $GITHUB_OUTPUT
            echo "Directories to rebuild: $DIRS_TO_BUILD"
            echo "tool_dirs=${DIRS_TO_BUILD}" >> $GITHUB_OUTPUT
          else
            echo "No Dockerfile changes detected. Container rebuild is NOT required."
            echo "build_required=false" >> $GITHUB_OUTPUT
            echo "tool_dirs=" >> $GITHUB_OUTPUT
          fi
          
      # --- Step 5 only runs if a Dockerfile was changed ---
      - name: Build, Push, and Patch
        if: steps.build_logic.outputs.build_required == 'true'
        run: |
          set -e
          echo "Starting build and patch process for directories with changed Dockerfiles..."
          # The tool_dirs variable now correctly contains 'tools/cfsan2snp2'
          for tool_dir in ${{ steps.build_logic.outputs.tool_dirs }}; do
            [ -z "$tool_dir" ] && continue
            
            TOOL_NAME=$(basename "$tool_dir") # This will be 'cfsan2snp2'
            echo "=================================================="
            echo "Processing repository: ${TOOL_NAME}"
            echo "=================================================="

            INNER_TOOL_DIR="${tool_dir}/${TOOL_NAME}"
            DOCKERFILE_PATH="${INNER_TOOL_DIR}/Dockerfile"

            # A. Build and Push the Docker Image
            IMAGE_NAME="quay.io/galaxytrakr/${TOOL_NAME}"
            UNIQUE_TAG=$(git rev-parse --short HEAD)
            FULL_IMAGE_TAG="${IMAGE_NAME}:${UNIQUE_TAG}"
            
            echo "Building and pushing image: ${FULL_IMAGE_TAG}"
            docker build -t "${FULL_IMAGE_TAG}" -f "${DOCKERFILE_PATH}" "${INNER_TOOL_DIR}"
            docker push "${FULL_IMAGE_TAG}"

            # B. Patch ALL Tool XML Files in the Inner Directory
            echo "Patching all XML files in ${INNER_TOOL_DIR}..."
            for TOOL_XML_FILE in ${INNER_TOOL_DIR}/*.xml; do
              if [ -f "$TOOL_XML_FILE" ]; then
                  sed -i -E "s|<container type=\"docker\">.*</container>|<container type=\"docker\">${FULL_IMAGE_TAG}</container>|" "${TOOL_XML_FILE}"
              fi
            done
          done

      # --- Step 6 only runs if a build happened ---
      - name: Commit and Push Updated XML Files
        if: steps.build_logic.outputs.build_required == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if ! git diff-index --quiet HEAD; then
            echo "Detected patched XML files. Committing and pushing back..."
            git add tools/
            git commit -m "ci: Update container tags for rebuilt tools"
            git push
          else
            echo "No files were patched, nothing to commit."
          fi

